spring.application.name=universidad-spring
# Configuración de la base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/universidad-spring
spring.datasource.username=root
spring.datasource.password=Temp2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# para subir una imagen al servidor web (Apache Tomcat)
# especificar el tamaño máximo permitido para la carga de archivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-part-count=30
# Configuración del puerto del servidor
#server.port=8080
